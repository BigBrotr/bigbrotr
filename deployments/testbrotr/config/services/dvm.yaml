# =============================================================================
# DVM Service Configuration (TestBrotr)
# =============================================================================
# Nostr Data Vending Machine for querying relay and event data via NIP-90.
# Only values that differ from defaults are specified here.
# =============================================================================

name: "TestBrotr DVM"
about: "Read-only access to TestBrotr relay monitoring data"
d_tag: "testbrotr-dvm"

pool:
  user: reader
  password_env: DB_READER_PASSWORD  # pragma: allowlist secret
  max_size: 1

interval: 300.0

default_page_size: 20
max_page_size: 100
announce: false
fetch_timeout: 10.0

tables:
  relay:
    enabled: true
  event:
    enabled: true
  event_relay:
    enabled: true
  metadata:
    enabled: true
  relay_metadata:
    enabled: true
  relay_metadata_current:
    enabled: true
  pubkey_stats:
    enabled: true
  kind_stats:
    enabled: true
  relay_stats:
    enabled: true
  pubkey_relay_stats:
    enabled: true
  pubkey_kind_stats:
    enabled: true
  relay_kind_stats:
    enabled: true
  relay_software_counts:
    enabled: true
  supported_nip_counts:
    enabled: true
  daily_counts:
    enabled: true
  events_replaceable_current:
    enabled: true
  events_addressable_current:
    enabled: true
  nip85_pubkey_stats:
    enabled: true
  nip85_event_stats:
    enabled: true
  nip85_addressable_stats:
    enabled: true
  nip85_identifier_stats:
    enabled: true

metrics:
  enabled: true
  host: "0.0.0.0"
