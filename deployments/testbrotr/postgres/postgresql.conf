# ============================================================================
# PostgreSQL Configuration for TestBrotr
# ============================================================================
# Optimized for a tiny local test stack with all services enabled.
# Memory settings target a host with scarce spare RAM.
# ============================================================================

# ----------------------------------------------------------------------------
# Connection Settings
# ----------------------------------------------------------------------------
listen_addresses = '*'                   # Allow connections from all addresses
max_connections = 60                     # Total connections (via PGBouncer)
superuser_reserved_connections = 3       # Reserved for admin
password_encryption = 'scram-sha-256'    # Match PGBouncer AUTH_TYPE  # pragma: allowlist secret

# ----------------------------------------------------------------------------
# Memory Settings
# ----------------------------------------------------------------------------
# Tuned for a tiny test host, not high-throughput ingestion.
shared_buffers = 128MB                   # PostgreSQL data cache
effective_cache_size = 512MB             # OS cache estimate
work_mem = 2MB                           # Per-operation memory (sorts, joins)
maintenance_work_mem = 64MB              # VACUUM, CREATE INDEX, etc.

# ----------------------------------------------------------------------------
# Write-Ahead Log (WAL) - Critical for write performance
# ----------------------------------------------------------------------------
wal_buffers = 4MB                        # WAL write buffer
min_wal_size = 128MB                     # Minimum WAL size before recycling
max_wal_size = 512MB                     # Maximum WAL size before checkpoint
checkpoint_completion_target = 0.9       # Spread checkpoint I/O
checkpoint_timeout = 5min                # Time between checkpoints

# ----------------------------------------------------------------------------
# Query Planner
# ----------------------------------------------------------------------------
random_page_cost = 1.1                   # SSD-optimized (1.1 vs 4.0 for HDD)
effective_io_concurrency = 16            # Conservative tiny-host I/O setting
default_statistics_target = 100          # Statistics sampling

# ----------------------------------------------------------------------------
# Parallel Query Execution
# ----------------------------------------------------------------------------
max_worker_processes = 2                 # Background workers
max_parallel_workers = 2                 # Parallel query workers
max_parallel_workers_per_gather = 1      # Workers per parallel query
max_parallel_maintenance_workers = 1     # Workers for VACUUM, INDEX

# ----------------------------------------------------------------------------
# Write Performance (Synchronizer optimization)
# ----------------------------------------------------------------------------
synchronous_commit = off                 # Async commits (faster, slight risk)
commit_delay = 100                       # Microseconds to batch commits
commit_siblings = 5                      # Min concurrent transactions to delay
wal_writer_delay = 200ms                 # WAL writer sleep time

# Note: synchronous_commit=off means ~10ms of data loss risk on crash
# Acceptable since Nostr events can be re-fetched

# ----------------------------------------------------------------------------
# Connection & Statement Timeout
# ----------------------------------------------------------------------------
statement_timeout = 0                    # No timeout (handled by app)
idle_in_transaction_session_timeout = 60000  # 60s idle transaction timeout

# ----------------------------------------------------------------------------
# Logging (minimal for performance)
# ----------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off                  # Docker handles logs
log_min_messages = warning
log_min_error_statement = error
log_statement = 'none'                   # Don't log statements (perf)
log_duration = off

# ----------------------------------------------------------------------------
# Autovacuum (tuned for high write throughput)
# ----------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 1
autovacuum_naptime = 60s                 # Check every 60s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1     # 10% of table
autovacuum_analyze_scale_factor = 0.05   # 5% of table
autovacuum_vacuum_cost_delay = 2ms       # Faster vacuum

# ----------------------------------------------------------------------------
# Locale & Encoding
# ----------------------------------------------------------------------------
timezone = 'UTC'
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'

# ----------------------------------------------------------------------------
# Extensions (shared_preload_libraries)
# ----------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all           # Track all statements (top, nested)
pg_stat_statements.max = 2000            # Max tracked statements

# ----------------------------------------------------------------------------
# Partitioning
# ----------------------------------------------------------------------------
enable_partitionwise_join = on           # Join per-partition (HASH co-located)
enable_partitionwise_aggregate = on      # Aggregate per-partition

# ============================================================================
# Performance Notes
# ============================================================================
# - synchronous_commit=off: ~2-3x write performance gain
# - Defaults tuned for low-resource local test environments
# - HASH partitioning on event/event_relay: partitionwise join + aggregate
#   enabled to let the planner push joins and aggregates into partitions
# - Use BigBrotr/LilBrotr for heavier ingestion or larger history backfills.
# ============================================================================
