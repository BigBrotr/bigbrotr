# ============================================================================
# TestBrotr Docker Compose Configuration
# ============================================================================
# Description: Tiny full-stack deployment for low-resource testing.
# Components: PostgreSQL, PGBouncer, all BigBrotr services, and monitoring.
# Note: TestBrotr clones LilBrotr's lightweight event storage and disables
#       overlay-network proxies by default to keep the stack small.
# Usage: docker-compose up -d
#
# To enable Tor/I2P/Lokinet support:
#   1. Add or uncomment the proxy service definition
#   2. Uncomment the corresponding volume in the volumes section
#   3. Uncomment the depends_on entries in validator/monitor/synchronizer
#   4. Enable the network in config/*.yaml (set enabled: true)
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL Database
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:18-alpine@sha256:ef9e5f962db375d64c9e01bf12c41426d63c64b8cdf962daf35b60e74aa95ce5
    container_name: testbrotr-postgres
    restart: unless-stopped
    mem_limit: 1g
    cpus: "1.00"

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD}
      POSTGRES_DB: testbrotr
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      PGDATA: /var/lib/postgresql/data/pgdata
      DB_WRITER_PASSWORD: ${DB_WRITER_PASSWORD}
      DB_READER_PASSWORD: ${DB_READER_PASSWORD}
      DB_REFRESHER_PASSWORD: ${DB_REFRESHER_PASSWORD}
      DB_RANKER_PASSWORD: ${DB_RANKER_PASSWORD}

    volumes:
      - ./data/postgres:/var/lib/postgresql/data                # Persistent data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro          # Init scripts
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro

    ports:
      - "127.0.0.1:5434:5432"

    networks:
      - testbrotr-data-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d testbrotr"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]

  # --------------------------------------------------------------------------
  # PGBouncer (Connection Pooler)
  # --------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0@sha256:cf8ba55692e4818e983dc047acf1711f17dd4ab1da7d47bdab8b9b2cc14337dc
    container_name: testbrotr-pgbouncer
    restart: unless-stopped
    mem_limit: 64m
    cpus: "0.10"

    environment:
      POSTGRES_DB: testbrotr
      DB_ADMIN_PASSWORD: ${DB_ADMIN_PASSWORD}
      DB_WRITER_PASSWORD: ${DB_WRITER_PASSWORD}
      DB_READER_PASSWORD: ${DB_READER_PASSWORD}
      DB_REFRESHER_PASSWORD: ${DB_REFRESHER_PASSWORD}
      DB_RANKER_PASSWORD: ${DB_RANKER_PASSWORD}

    entrypoint: ["/custom-entrypoint.sh"]

    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/entrypoint.sh:/custom-entrypoint.sh:ro

    ports:
      - "127.0.0.1:6434:5432"

    networks:
      - testbrotr-data-network

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U admin"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s


    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # --------------------------------------------------------------------------
  # Overlay proxies are disabled by default to keep TestBrotr tiny.
  # --------------------------------------------------------------------------
