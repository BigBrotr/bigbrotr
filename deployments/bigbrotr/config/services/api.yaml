# =============================================================================
# API Service Configuration (BigBrotr)
# =============================================================================
# Read-only HTTP API for querying relay and event data.
# This deployment file keeps deployment-local overrides and a few restated
# operator-facing defaults. See docs/user-guide/services.md and
# src/bigbrotr/services/api/configs.py for the full config contract.
# =============================================================================

pool:
  user: reader
  password_env: DB_READER_PASSWORD
  min_size: 2

interval: 60.0

# Adapter-local protocol exposure policy over public readable resources.
# Resources not listed here remain unavailable on this protocol surface.
read_models:
  relays:
    enabled: true
  events:
    enabled: false
  event-observations:
    enabled: false
  documents:
    enabled: true
  relay-document-history:
    enabled: true
  relay-document-current:
    enabled: true
  pubkey-stats:
    enabled: true
  kind-stats:
    enabled: true
  relay-stats:
    enabled: true
  pubkey-relay-stats:
    enabled: true
  pubkey-kind-stats:
    enabled: true
  relay-kind-stats:
    enabled: true
  relay-software-counts:
    enabled: true
  supported-nip-counts:
    enabled: true
  daily-counts:
    enabled: true
  replaceable-events-current:
    enabled: true
  addressable-events-current:
    enabled: true
  nip85-pubkey-stats:
    enabled: true
  nip85-event-stats:
    enabled: true
  nip85-addressable-stats:
    enabled: true
  nip85-identifier-stats:
    enabled: true

metrics:
  enabled: true
  host: "0.0.0.0"
