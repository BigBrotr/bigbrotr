# =============================================================================
# API Service Configuration (BigBrotr)
# =============================================================================
# Read-only HTTP API for querying relay and event data.
# Only values that differ from defaults are specified here.
# =============================================================================

pool:
  user: reader
  password_env: DB_READER_PASSWORD
  min_size: 2

interval: 60.0

tables:
  relay:
    enabled: true
  event:
    enabled: false
  event_relay:
    enabled: false
  metadata:
    enabled: true
  relay_metadata:
    enabled: true
  relay_metadata_current:
    enabled: true
  pubkey_stats:
    enabled: true
  kind_stats:
    enabled: true
  relay_stats:
    enabled: true
  pubkey_relay_stats:
    enabled: true
  pubkey_kind_stats:
    enabled: true
  relay_kind_stats:
    enabled: true
  relay_software_counts:
    enabled: true
  supported_nip_counts:
    enabled: true
  daily_counts:
    enabled: true
  events_replaceable_current:
    enabled: true
  events_addressable_current:
    enabled: true
  nip85_pubkey_stats:
    enabled: true
  nip85_event_stats:
    enabled: true
  nip85_addressable_stats:
    enabled: true
  nip85_identifier_stats:
    enabled: true

metrics:
  enabled: true
  host: "0.0.0.0"
