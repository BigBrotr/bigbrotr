# =============================================================================
# Finder Service Configuration (BigBrotr)
# =============================================================================
# Discovers new relay URLs from stored events and external APIs.
# This deployment file keeps deployment-local overrides and a few restated
# operator-facing defaults. See docs/user-guide/services.md and
# src/bigbrotr/services/finder/configs.py for the full config contract.
# =============================================================================

pool:
  user: writer
  password_env: DB_WRITER_PASSWORD
  max_size: 3

metrics:
  enabled: true
  host: "0.0.0.0"                  # Bind to all interfaces for Docker access
