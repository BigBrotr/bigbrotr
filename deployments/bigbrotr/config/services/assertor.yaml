# =============================================================================
# Assertor Service Configuration (BigBrotr)
# =============================================================================
# NIP-85 provider-package publisher. Reads ranked NIP-85 facts and publishes
# trusted assertions, provider profile, and trusted-provider list events.
# This deployment file keeps deployment-local overrides and a few restated
# operator-facing defaults. See docs/user-guide/services.md and
# src/bigbrotr/services/assertor/configs.py for the full config contract.
# =============================================================================

pool:
  user: writer
  password_env: DB_WRITER_PASSWORD
  max_size: 3

algorithm_id: global-pagerank
keys:
  keys_env: NOSTR_PRIVATE_KEY_ASSERTOR

interval: 3600.0

selection:
  batch_size: 500
  min_events: 5
  top_topics: 5
  kinds:
    - 30382
    - 30383
    - 30384
    - 30385

cleanup:
  remove_stale_checkpoints: true

provider_profile:
  enabled: true
  kind0_content:
    name: BigBrotr Global PageRank
    about: NIP-85 trusted assertion provider for the global-pagerank algorithm
    website: https://bigbrotr.com
    extra_fields:
      software: bigbrotr

trusted_provider_list:
  enabled: true
  relay_hint: wss://relay.damus.io
  tag_names:
    - rank

metrics:
  enabled: true
  host: "0.0.0.0"
