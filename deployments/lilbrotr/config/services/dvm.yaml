# =============================================================================
# DVM Service Configuration (LilBrotr)
# =============================================================================
# Nostr Data Vending Machine for querying relay and event data via NIP-90.
# Only values that differ from defaults are specified here.
# =============================================================================

name: "LilBrotr DVM"
about: "Read-only access to LilBrotr relay monitoring data"
d_tag: "lilbrotr-dvm"

pool:
  user: reader
  password_env: DB_READER_PASSWORD
  max_size: 3

interval: 60.0

tables:
  relay:
    enabled: true
  event:
    enabled: true
  event_relay:
    enabled: true
  metadata:
    enabled: true
  relay_metadata:
    enabled: true
  relay_metadata_current:
    enabled: true
  pubkey_stats:
    enabled: true
  kind_stats:
    enabled: true
  relay_stats:
    enabled: true
  pubkey_relay_stats:
    enabled: true
  pubkey_kind_stats:
    enabled: true
  relay_kind_stats:
    enabled: true
  relay_software_counts:
    enabled: true
  supported_nip_counts:
    enabled: true
  daily_counts:
    enabled: true
  events_replaceable_current:
    enabled: true
  events_addressable_current:
    enabled: true
  nip85_pubkey_stats:
    enabled: true
  nip85_event_stats:
    enabled: true

metrics:
  enabled: true
  host: "0.0.0.0"
