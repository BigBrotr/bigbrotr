# =============================================================================
# Synchronizer Service Configuration (LilBrotr)
# =============================================================================
# Fetches Nostr events from relays and stores them with relay associations.
# Uses asyncio.TaskGroup with semaphore-bounded concurrency.
# This deployment file keeps deployment-local overrides and a few restated
# operator-facing defaults. See docs/user-guide/services.md and
# src/bigbrotr/services/synchronizer/configs.py for the full config contract.
# =============================================================================

pool:
  user: writer
  password_env: DB_WRITER_PASSWORD
  min_size: 2

metrics:
  enabled: true
  host: "0.0.0.0"                  # Bind to all interfaces for Docker access

networks:
  tor:
    enabled: true                  # Sync from Tor (.onion) relays
