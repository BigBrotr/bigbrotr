# =============================================================================
# Assertor Service Configuration (LilBrotr)
# =============================================================================
# NIP-85 Trusted Assertions publisher. Reads engagement metrics from summary
# tables and publishes kind 30382/30383 events to configured relays.
# Only values that differ from defaults are specified here.
# =============================================================================

pool:
  user: writer
  password_env: DB_WRITER_PASSWORD
  max_size: 3

interval: 3600.0

batch_size: 500
min_events: 5
top_topics: 5

kinds:
  - 30382
  - 30383

metrics:
  enabled: true
  port: 9008
