# =============================================================================
# Assertor Service Configuration (LilBrotr)
# =============================================================================
# NIP-85 Trusted Assertions publisher. Reads ranked NIP-85 facts and publishes
# kinds 30382/30383/30384/30385 to configured relays in
# algorithm-aware v2 mode.
# Only values that differ from defaults are specified here.
# =============================================================================

pool:
  user: writer
  password_env: DB_WRITER_PASSWORD
  max_size: 3

algorithm_id: global-pagerank-v1
keys:
  keys_env: NOSTR_PRIVATE_KEY_ASSERTOR

interval: 3600.0

selection:
  batch_size: 500
  min_events: 5
  top_topics: 5
  kinds:
    - 30382
    - 30383
    - 30384
    - 30385

cleanup:
  remove_legacy_checkpoints: true
  remove_stale_checkpoints: true

provider_profile:
  enabled: true
  kind0_content:
    name: LilBrotr Global PageRank v1
    about: NIP-85 trusted assertion provider for the global-pagerank-v1 algorithm
    website: https://bigbrotr.com
    extra_fields:
      software: lilbrotr
      algorithm_version: v1

metrics:
  enabled: true
  port: 9008
