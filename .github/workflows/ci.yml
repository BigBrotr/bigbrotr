# ============================================================================
# BigBrotr CI Pipeline
# ============================================================================
#
# Runs on push to main/develop and pull requests to main/develop.
# Jobs: pre-commit, unit-test (matrix), integration-test, docs, build (Docker)
#
# Job graph:
#   pre-commit ──┬──> unit-test (matrix: 3.11-3.14)
#                ├──> integration-test
#                ├──> docs
#                └──> build (matrix: bigbrotr/lilbrotr, main/develop only)
#
#   ci-success (gate for branch protection)
#     └──> needs: [pre-commit, unit-test, integration-test, docs, build]
#
# ============================================================================

name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/CODE_OF_CONDUCT.md"
      - ".github/SECURITY.md"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/CODE_OF_CONDUCT.md"
      - ".github/SECURITY.md"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION_DEFAULT: "3.11"
  PYTHONUNBUFFERED: "1"

jobs:
  # --------------------------------------------------------------------------
  # Pre-commit: All linting, formatting, type checking, and security checks
  # --------------------------------------------------------------------------
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  # --------------------------------------------------------------------------
  # Unit Test: Run unit tests across Python versions
  # --------------------------------------------------------------------------
  unit-test:
    name: Unit Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [pre-commit]
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        include:
          - python-version: "3.14"
            allow-prereleases: true

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.allow-prereleases || false }}

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Audit dependencies
        run: uv run uv-secure uv.lock
        continue-on-error: ${{ matrix.python-version == '3.14' }}

      - name: Check SQL template drift
        run: uv run python tools/generate_sql.py --check

      - name: Run unit tests
        run: >-
          uv run pytest tests/
          --ignore=tests/integration/
          --cov=src/bigbrotr
          --cov-report=xml
          --cov-report=term-missing
          -v --tb=short
        env:
          DB_ADMIN_PASSWORD: test_password

      - name: Upload coverage
        if: matrix.python-version == '3.11' && github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
          verbose: true

  # --------------------------------------------------------------------------
  # Integration Test: Run integration tests with testcontainers
  # --------------------------------------------------------------------------
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [pre-commit]
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run integration tests
        run: >-
          uv run pytest tests/integration/
          -v --tb=short --timeout=120
        env:
          DB_ADMIN_PASSWORD: test_password

  # --------------------------------------------------------------------------
  # Docs: Build documentation (strict mode)
  # --------------------------------------------------------------------------
  docs:
    name: Docs
    runs-on: ubuntu-latest
    needs: [pre-commit]
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install dependencies
        run: uv sync --frozen --group docs

      - name: Build documentation
        run: uv run mkdocs build --strict

  # --------------------------------------------------------------------------
  # Build: Docker images + security scan (main/develop only)
  # --------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.deployment }})
    runs-on: ubuntu-latest
    needs: [pre-commit, unit-test, integration-test]
    timeout-minutes: 20
    permissions:
      security-events: write
      actions: read
      contents: read
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      fail-fast: false
      matrix:
        deployment: [bigbrotr, lilbrotr]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: deployments/Dockerfile
          build-args: |
            DEPLOYMENT=${{ matrix.deployment }}
            VERSION=${{ github.sha }}
          push: false
          load: true
          tags: ${{ matrix.deployment }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.deployment }}
          cache-to: type=gha,scope=${{ matrix.deployment }},mode=max

      - name: Trivy scan (gate)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ matrix.deployment }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Trivy scan (SARIF report)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        if: always()
        with:
          image-ref: ${{ matrix.deployment }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.deployment }}.sarif
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        if: always()
        with:
          sarif_file: trivy-${{ matrix.deployment }}.sarif
          category: trivy-${{ matrix.deployment }}

  # --------------------------------------------------------------------------
  # Gate: Summary job for branch protection
  # --------------------------------------------------------------------------
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    needs: [pre-commit, unit-test, integration-test, docs, build]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.pre-commit.result }}" != "success" ]] || \
             [[ "${{ needs.unit-test.result }}" != "success" ]] || \
             [[ "${{ needs.integration-test.result }}" != "success" ]] || \
             [[ "${{ needs.docs.result }}" != "success" ]]; then
            echo "::error::One or more required jobs failed"
            echo "  pre-commit:       ${{ needs.pre-commit.result }}"
            echo "  unit-test:        ${{ needs.unit-test.result }}"
            echo "  integration-test: ${{ needs.integration-test.result }}"
            echo "  docs:             ${{ needs.docs.result }}"
            echo "  build:            ${{ needs.build.result }}"
            exit 1
          fi
          # build is allowed to be skipped (PRs don't trigger it)
          if [[ "${{ needs.build.result }}" != "success" && \
                "${{ needs.build.result }}" != "skipped" ]]; then
            echo "::error::Build failed: ${{ needs.build.result }}"
            exit 1
          fi
          echo "All required jobs passed"
