# ============================================================================
# BigBrotr Release Pipeline
# ============================================================================
#
# Triggered by pushing a version tag (v*.*.*).
# Validates, builds, publishes to PyPI + Docker Hub, and creates a GitHub release.
#
# Job graph:
#   validate ──┬──> build-python (sdist + wheel + twine check)
#              └──> build-docker (matrix, Trivy gate, SBOM, NO push)
#                        │
#              ┌─────────┴─────────┐
#              v                   v
#        publish-pypi        publish-dockerhub (matrix, cache-hit rebuild + push)
#              │                   │
#              └─────────┬─────────┘
#                        v
#                   release (GitHub Release + attach artifacts)
#
# ============================================================================

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

env:
  PYTHON_VERSION_DEFAULT: "3.11"
  PYTHONUNBUFFERED: "1"

jobs:
  # --------------------------------------------------------------------------
  # Validate: Full CI suite + version/branch guards
  # --------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml ($PKG_VERSION)"
            exit 1
          fi
          echo "Version validated: $TAG_VERSION"

      - name: Verify tag is on main branch
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "::error::Tag must point to a commit on the main branch"
            exit 1
          fi
          echo "Tag is on main branch"

      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

      - name: Run unit tests
        run: >-
          uv run pytest tests/
          --ignore=tests/integration/
          -v --tb=short
        env:
          DB_ADMIN_PASSWORD: test_password

  # --------------------------------------------------------------------------
  # Build Python: sdist + wheel + twine check
  # --------------------------------------------------------------------------
  build-python:
    name: Build Python Package
    runs-on: ubuntu-latest
    needs: [validate]
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Build sdist and wheel
        run: uv build

      - name: Validate package metadata
        run: |
          uv tool install twine
          twine check dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: python-dist
          path: dist/
          retention-days: 5

  # --------------------------------------------------------------------------
  # Build Docker: images + Trivy scan + SBOM (NO push)
  # --------------------------------------------------------------------------
  build-docker:
    name: Build Docker (${{ matrix.deployment }})
    runs-on: ubuntu-latest
    needs: [validate]
    timeout-minutes: 20
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        deployment: [bigbrotr, lilbrotr]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image (amd64 for scan)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: deployments/Dockerfile
          build-args: |
            DEPLOYMENT=${{ matrix.deployment }}
            VERSION=${{ github.ref_name }}
          push: false
          load: true
          platforms: linux/amd64
          tags: ${{ matrix.deployment }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.deployment }}
          cache-to: type=gha,scope=${{ matrix.deployment }},mode=max

      - name: Trivy scan (gate)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ matrix.deployment }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Trivy scan (SARIF report)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        if: always()
        with:
          image-ref: ${{ matrix.deployment }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.deployment }}.sarif
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4.33.0
        if: always()
        with:
          sarif_file: trivy-${{ matrix.deployment }}.sarif
          category: trivy-${{ matrix.deployment }}

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ matrix.deployment }}:${{ github.sha }}
          format: cyclonedx
          output: sbom-${{ matrix.deployment }}.cdx.json
          exit-code: 0

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom-${{ matrix.deployment }}
          path: sbom-${{ matrix.deployment }}.cdx.json
          retention-days: 5

  # --------------------------------------------------------------------------
  # Publish to PyPI (OIDC trusted publisher via uv)
  # --------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-python, build-docker]
    timeout-minutes: 10
    permissions:
      id-token: write
    environment: pypi
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0

      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always dist/*

  # --------------------------------------------------------------------------
  # Publish to Docker Hub (cache-hit rebuild + push)
  # --------------------------------------------------------------------------
  publish-dockerhub:
    name: Publish Docker Hub (${{ matrix.deployment }})
    runs-on: ubuntu-latest
    needs: [build-python, build-docker]
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        deployment: [bigbrotr, lilbrotr]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.deployment }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: deployments/Dockerfile
          build-args: |
            DEPLOYMENT=${{ matrix.deployment }}
            VERSION=${{ github.ref_name }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.deployment }}
          cache-to: type=gha,scope=${{ matrix.deployment }},mode=max

  # --------------------------------------------------------------------------
  # Release: Create GitHub release with all artifacts
  # --------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [publish-pypi, publish-dockerhub]
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download Python package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-dist
          path: dist/

      - name: Download BigBrotr SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom-bigbrotr
          path: sbom/

      - name: Download LilBrotr SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom-lilbrotr
          path: sbom/

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/d; /^## \[/d; p; }" CHANGELOG.md)
          if [[ -z "${NOTES// }" ]]; then
            echo "::warning::No changelog entry found for version $VERSION"
            NOTES="Release $VERSION"
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "$RELEASE_NOTES" \
            --verify-tag \
            dist/*.tar.gz dist/*.whl sbom/*.cdx.json
